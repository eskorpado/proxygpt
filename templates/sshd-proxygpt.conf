# Managed by ProxyGPT. Manual changes may be replaced by the installer.

Match Group codex-tunnel
    PubkeyAuthentication yes
    PasswordAuthentication no
    KbdInteractiveAuthentication no

    AllowTcpForwarding local
    PermitOpen 127.0.0.1:{{REMOTE_PROXY_PORT}}

    AllowStreamLocalForwarding no
    AllowAgentForwarding no
    X11Forwarding no
    PermitTTY no
    PermitTunnel no
    PermitUserRC no

# Завершаем условный блок до продолжения разбора следующих файлов sshd.
Match all
